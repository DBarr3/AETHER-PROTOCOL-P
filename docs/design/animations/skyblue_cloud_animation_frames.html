  body{background:#0a0a0f}
  .wrap{padding:24px 16px;font-family:'IBM Plex Mono',monospace}

  button:hover{background:rgba(3,169,244,0.15)}

</style>

function drawFrame(ctx, pixels) {
  ctx.clearRect(0,0,ctx.canvas.width,ctx.canvas.height);
  pixels.forEach(function(p) {
    var x=p[0], y=p[1], c=p[2];
    if(y<0||x<0) return;
    ctx.fillStyle = c;
    ctx.fillRect(x*P, y*P, P, P);
  });
}

// Static frame cards
var row = document.getElementById('frames-row');
FRAMES.forEach(function(f) {
  var col = document.createElement('div');
  col.className = 'frame-col';

  var lbl = document.createElement('div');
  lbl.className = 'frame-label';
  lbl.textContent = f.label;

  var cv = document.createElement('canvas');
  cv.width = 11*P; cv.height = 9*P;
  cv.style.cssText = 'width:'+11*P+'px;height:'+9*P+'px;image-rendering:pixelated';

  var nm = document.createElement('div');
  nm.className = 'frame-name';
  nm.textContent = f.name;

  col.appendChild(lbl);
  col.appendChild(cv);
  col.appendChild(nm);
  row.appendChild(col);

  drawFrame(cv.getContext('2d'), f.pixels);
});

// Live preview
var live = document.getElementById('live');
var liveCtx = live.getContext('2d');

var mode='primary', raf=null, lastTime=0, step=0;
var walkX=165, dir=1, idlePhase=0;

// Primary animation sequence
var PRIMARY_SEQ = [0,1,2,3,4,0];
var PRIMARY_DELAY = [400,300,250,300,200,400];

// Walk sequence
var WALK_SEQ = [1,2,3,2];
var WALK_DELAY = [250,250,250,250];

// Idle sequence
var IDLE_SEQ = [0,5,0,5];
var IDLE_DELAY = [1000,1000,1000,1000];

function setPos(x, bottom) {
  live.style.left = x + 'px';
  live.style.bottom = (bottom||4) + 'px';
}

function animPrimary(ts) {
  if(ts - lastTime > PRIMARY_DELAY[step]) {
    lastTime = ts;
    drawFrame(liveCtx, FRAMES[PRIMARY_SEQ[step]].pixels);
    step = (step+1) % PRIMARY_SEQ.length;
  }
  setPos(165);
  raf = requestAnimationFrame(animPrimary);
}

function animWalk(ts) {
  if(ts - lastTime > WALK_DELAY[step]) {
    lastTime = ts;
    drawFrame(liveCtx, FRAMES[WALK_SEQ[step]].pixels);
    step = (step+1) % WALK_SEQ.length;
    walkX += dir * 24;
    if(walkX > 310) dir = -1;
    if(walkX < 10) dir = 1;
  }
  setPos(walkX);
  raf = requestAnimationFrame(animWalk);
}

function animIdle(ts) {
  if(ts - lastTime > IDLE_DELAY[step]) {
    lastTime = ts;
    drawFrame(liveCtx, FRAMES[IDLE_SEQ[step]].pixels);
    step = (step+1) % IDLE_SEQ.length;
  }
  setPos(165);
  raf = requestAnimationFrame(animIdle);
}

function startAnim(m) {
  mode = m;
  if(raf) cancelAnimationFrame(raf);
  step=0; walkX=165; dir=1; idlePhase=0; lastTime=0;
  drawFrame(liveCtx, FRAMES[0].pixels);
  document.querySelectorAll('button').forEach(function(b){b.classList.remove('active')});
  if(m==='primary') document.getElementById('btn-primary').classList.add('active');
  if(m==='walk') document.getElementById('btn-walk').classList.add('active');
  if(m==='idle') document.getElementById('btn-idle').classList.add('active');
  if(m==='primary') raf = requestAnimationFrame(animPrimary);
  if(m==='walk') raf = requestAnimationFrame(animWalk);
  if(m==='idle') raf = requestAnimationFrame(animIdle);
}

document.getElementById('btn-primary').onclick = function(){startAnim('primary')};
document.getElementById('btn-walk').onclick = function(){startAnim('walk')};
document.getElementById('btn-idle').onclick = function(){startAnim('idle')};

setPos(165);
startAnim('primary');
</script>
