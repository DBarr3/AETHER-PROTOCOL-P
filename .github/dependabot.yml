version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/site"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "npm"
    groups:
      dev-tooling:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
      production-minor-patch:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "next"
        update-types:
          - "version-update:semver-major"
      # zod v4 breaks schema API — tracked in issue #29
      - dependency-name: "zod"
        versions: ["4.x"]
      # eslint-config-next v16 requires eslint v9+ (flat config) — tracked in issue #30
      - dependency-name: "eslint-config-next"
        versions: ["16.x"]
      # react v19 + @types/react v19 require coordinated upgrade with react-dom — tracked in issue #32
      - dependency-name: "react"
        versions: ["19.x"]
      - dependency-name: "@types/react"
        versions: ["19.x"]
      # @vitest/ui v4 requires vitest v4 as peer; both must move together — tracked in issue #33
      - dependency-name: "@vitest/ui"
        versions: ["4.x"]
      # stripe v22 pins apiVersion literal to "2026-03-25.dahlia"; requires coordinated API-version bump + E2E verification — tracked in issue #51
      - dependency-name: "stripe"
        versions: ["15.x", "16.x", "17.x", "18.x", "19.x", "20.x", "21.x", "22.x"]

  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"
    groups:
      test-tooling:
        patterns:
          - "pytest*"
          - "hypothesis"
          - "coverage*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "anthropic"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "supabase"
        update-types:
          - "version-update:semver-major"
