version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/site"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "npm"
    groups:
      dev-tooling:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
      production-minor-patch:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "next"
        update-types:
          - "version-update:semver-major"

  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"
    groups:
      test-tooling:
        patterns:
          - "pytest*"
          - "hypothesis"
          - "coverage*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      - dependency-name: "anthropic"
        update-types:
          - "version-update:semver-major"
      - dependency-name: "supabase"
        update-types:
          - "version-update:semver-major"
