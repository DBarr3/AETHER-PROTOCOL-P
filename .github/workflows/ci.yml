name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  ts-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: site/package-lock.json
      - run: npm ci --prefix site
      - run: npm test --prefix site

  python-router-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt
      - run: pip install -r requirements.txt
      - run: pytest tests/test_router.py tests/test_uvt_routes.py tests/test_router_client.py tests/test_pricing_guard.py tests/test_uvt_parity.py tests/test_model_router_invariant.py tests/test_token_accountant.py -q

  otel-pii-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash tests/lint/no_pii_in_otel.sh

  anthropic-import-isolation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: pytest tests/security/test_anthropic_import_isolation.py -v

  ts-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: site/package-lock.json
      - run: npm ci --prefix site
      - run: npm run typecheck --prefix site
