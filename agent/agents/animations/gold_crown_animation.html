
<style>
  body{background:#0a0a0f}
  .wrap{padding:24px 16px;font-family:'IBM Plex Mono',monospace}
  .frames-row{display:flex;gap:16px;align-items:flex-end;justify-content:center;flex-wrap:wrap;margin-bottom:28px}
  .frame-col{display:flex;flex-direction:column;align-items:center;gap:8px}
  .frame-label{font-size:10px;color:#475569;letter-spacing:0.1em}
  .frame-name{font-size:9px;color:#E65100;text-align:center}
  canvas{image-rendering:pixelated;image-rendering:crisp-edges;display:block}
  .bar{width:440px;height:3px;background:#1e2030;border-radius:2px;margin:0 auto 6px}
  .bar-label{font-size:9px;color:#334155;text-align:center;letter-spacing:0.12em;margin-bottom:20px}
  .preview-wrap{display:flex;flex-direction:column;align-items:center;gap:8px;margin-bottom:24px}
  .preview-label{font-size:10px;color:#475569;letter-spacing:0.1em}
  .preview-stage{width:440px;height:120px;position:relative;overflow:hidden}
  .preview-crown{position:absolute;image-rendering:pixelated}
  .controls{display:flex;gap:10px;justify-content:center}
  button{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.1em;color:#FFD54F;background:rgba(255,193,7,0.07);border:1px solid rgba(255,193,7,0.25);border-radius:4px;padding:5px 14px;cursor:pointer}
  button:hover{background:rgba(255,193,7,0.15)}
  button.active{background:rgba(255,193,7,0.22);border-color:rgba(255,213,79,0.7)}
</style>

<div class="wrap">
<div class="frames-row" id="frames-row"></div>
<div class="bar-label">INPUT BAR</div>
<div class="bar"></div>

<div class="preview-wrap">
  <div class="preview-label">LIVE PREVIEW</div>
  <div class="preview-stage">
    <canvas id="live" class="preview-crown" width="110" height="120"></canvas>
  </div>
  <div class="bar"></div>
  <div class="bar-label">INPUT BAR</div>
</div>

<div class="controls">
  <button id="btn-reign" class="active">ROYAL GLEAM</button>
  <button id="btn-strut">STRUT</button>
  <button id="btn-idle">IDLE</button>
</div>
</div>

<script>
const P  = 10;
const GD = '#FFC107';  // gold main
const LG = '#FFD54F';  // light gold
const DG = '#FF8F00';  // dark gold / amber shadow
const WH = '#FFFDE7';  // warm white — crown tip flash
const RD = '#FF1744';  // ruby — left jewel
const SP = '#00E5FF';  // sapphire — center jewel
const EM = '#00E676';  // emerald — right jewel
const GL = '#FFFFFF';  // pure white gleam

// Full body [x,y]
const BODY = [
  // three crown tips
  [1,0],[5,0],[9,0],
  // crown band rows 1-3
  [1,1],[3,1],[5,1],[7,1],[9,1],
  [1,2],[2,2],[3,2],[4,2],[5,2],[6,2],[7,2],[8,2],[9,2],
  [1,3],[2,3],[3,3],[4,3],[5,3],[6,3],[7,3],[8,3],[9,3],
  // body rows 4-6
  [2,4],[3,4],[4,4],[5,4],[6,4],[7,4],[8,4],
  [2,5],[3,5],      [5,5],      [7,5],[8,5],
  [2,6],[3,6],[4,6],[5,6],[6,6],[7,6],[8,6],
  // lower body
  [2,7],[3,7],[4,7],      [6,7],[7,7],[8,7],
  [3,8],[4,8],[5,8],[6,8],[7,8],
  [3,9],      [5,9],      [7,9],
];

// Crown tips (for jewel lighting)
const TIP_L  = [[1,0],[1,1]];
const TIP_C  = [[5,0],[5,1]];
const TIP_R  = [[9,0],[9,1]];
// Eyes
const EYES   = [[4,5],[6,5]];

function isEye(x,y){ return EYES.some(([ex,ey])=>ex===x&&ey===y); }
function isTip(x,y,tips){ return tips.some(([tx,ty])=>tx===x&&ty===y); }

function buildCrown(tipColors, eyeColor, bodyColor, accentRows, yShift) {
  // tipColors: [leftColor, centerColor, rightColor]
  // accentRows: optional {rowRange, color} for body highlight
  yShift = yShift||0;
  const out = [];
  BODY.forEach(([x,y])=>{
    if(isEye(x,y)) return;
    let c = bodyColor;
    if(isTip(x,y,TIP_L)) c = tipColors[0];
    else if(isTip(x,y,TIP_C)) c = tipColors[1];
    else if(isTip(x,y,TIP_R)) c = tipColors[2];
    else if(accentRows && y>=accentRows.min && y<=accentRows.max) c = accentRows.color;
    out.push([x, y+yShift, c]);
  });
  EYES.forEach(([x,y])=>out.push([x,y+yShift,eyeColor]));
  return out;
}

// F1 — IDLE: all gold, warm eyes, regal
const F1 = buildCrown([GD,GD,GD], LG, GD, null, 0);

// F2 — LEFT GLEAM: left tip flashes ruby, center dims, right dims
//      crown lifts up 1px (regal tilt left)
const F2 = buildCrown([RD,DG,DG], SP, GD, {min:1,max:3,color:LG}, -1);

// F3 — CENTER GLEAM: center tip blazes white, both sides amber, body gold
//      crown at normal height — peak of the sweep
const F3 = buildCrown([LG,WH,LG], WH, LG, {min:0,max:2,color:WH}, -1);

// F4 — RIGHT GLEAM: right tip flashes emerald, others dim
//      crown tilts right
const F4 = buildCrown([DG,DG,EM], RD, GD, {min:1,max:3,color:LG}, -1);

// F5 — FULL BLAZE: all three tips roar — ruby/white/emerald simultaneously
//      body goes warm white, eyes both flash white, lifts +2
//      jewel sparkles scatter outward
const F5_BASE = buildCrown([RD,GL,EM], GL, WH, {min:0,max:3,color:WH}, -2);
const SPARKLES = [
  [0,0,RD],[2,0,GL],   // left tip sparks
  [4,0,GL],[6,0,GL],   // center sparks
  [8,0,GL],[10,0,EM],  // right tip sparks
];
const F5 = [...F5_BASE, ...SPARKLES];

const FRAMES = [
  { label:'F1', name:'idle',         pixels: F1 },
  { label:'F2', name:'left gleam',   pixels: F2 },
  { label:'F3', name:'center blaze', pixels: F3 },
  { label:'F4', name:'right gleam',  pixels: F4 },
  { label:'F5', name:'full blaze',   pixels: F5 },
];

function drawFrame(ctx, pixels) {
  ctx.clearRect(0,0,ctx.canvas.width,ctx.canvas.height);
  pixels.forEach(([x,y,c])=>{
    if(y<0||y>11||x<0||x>10) return;
    ctx.fillStyle=c;
    ctx.fillRect(x*P, y*P, P, P);
  });
}

// Static frame cards
const row = document.getElementById('frames-row');
FRAMES.forEach(f=>{
  const col=document.createElement('div');
  col.className='frame-col';
  const lbl=document.createElement('div');
  lbl.className='frame-label'; lbl.textContent=f.label;
  const cv=document.createElement('canvas');
  cv.width=11*P; cv.height=12*P;
  cv.style.cssText=`width:${11*P}px;height:${12*P}px;image-rendering:pixelated`;
  const nm=document.createElement('div');
  nm.className='frame-name'; nm.textContent=f.name;
  col.appendChild(lbl); col.appendChild(cv); col.appendChild(nm);
  row.appendChild(col);
  drawFrame(cv.getContext('2d'),f.pixels);
});

// Live preview
const live=document.getElementById('live');
const liveCtx=live.getContext('2d');
let raf=null,lastTime=0,step=0,walkX=165,dir=1,idlePhase=0;

// Royal gleam sequence: idle → L gleam → center blaze → R gleam → full blaze → center → idle
const REIGN_SEQ   = [0, 1, 2, 3, 4, 2, 1, 0];
const REIGN_DELAY = [500,140,120,140,180,120,140,600];

function setPos(x,bot){
  live.style.left=x+'px';
  live.style.bottom=(bot||8)+'px';
}

function animReign(ts){
  if(ts-lastTime>REIGN_DELAY[step]){
    lastTime=ts;
    drawFrame(liveCtx,FRAMES[REIGN_SEQ[step]].pixels);
    step=(step+1)%REIGN_SEQ.length;
  }
  // stately slow bob — royalty doesn't bounce fast
  const bob=Math.sin(ts/900)*2;
  setPos(165, 10+bob);
  raf=requestAnimationFrame(animReign);
}

function animStrut(ts){
  if(ts-lastTime>160){
    lastTime=ts;
    // cycle L gleam → center → R gleam as it struts
    idlePhase=(idlePhase+1)%3;
    drawFrame(liveCtx,FRAMES[idlePhase+1].pixels);
    walkX+=dir*18;
    if(walkX>310) dir=-1;
    if(walkX<10)  dir=1;
  }
  // slow dignified glide — no bouncing
  const bob=Math.sin(ts/600)*1.5;
  setPos(walkX, 10+bob);
  raf=requestAnimationFrame(animStrut);
}

// Idle: slow pulse between F1 and F3 (center gleam)
function animIdle(ts){
  if(ts-lastTime>1200){
    lastTime=ts;
    idlePhase=1-idlePhase;
    drawFrame(liveCtx, idlePhase===0?F1:F3);
  }
  const bob=Math.sin(ts/900)*1.5;
  setPos(165, 10+bob);
  raf=requestAnimationFrame(animIdle);
}

function startAnim(m){
  if(raf) cancelAnimationFrame(raf);
  step=0;walkX=165;dir=1;idlePhase=0;lastTime=0;
  drawFrame(liveCtx,F1);
  document.querySelectorAll('button').forEach(b=>b.classList.remove('active'));
  document.getElementById('btn-'+m).classList.add('active');
  if(m==='reign')  raf=requestAnimationFrame(animReign);
  if(m==='strut')  raf=requestAnimationFrame(animStrut);
  if(m==='idle')   raf=requestAnimationFrame(animIdle);
}

document.getElementById('btn-reign').onclick=()=>startAnim('reign');
document.getElementById('btn-strut').onclick=()=>startAnim('strut');
document.getElementById('btn-idle').onclick=()=>startAnim('idle');

setPos(165,10);
startAnim('reign');
</script>
