
<style>
  body{background:#0a0a0f}
  .wrap{padding:24px 16px;font-family:'IBM Plex Mono',monospace}
  .frames-row{display:flex;gap:20px;align-items:flex-end;justify-content:center;flex-wrap:wrap;margin-bottom:28px}
  .frame-col{display:flex;flex-direction:column;align-items:center;gap:8px}
  .frame-label{font-size:10px;color:#475569;letter-spacing:0.1em}
  .frame-name{font-size:9px;color:#334155;text-align:center}
  canvas{image-rendering:pixelated;image-rendering:crisp-edges;display:block}
  .bar{width:440px;height:3px;background:#1e2030;border-radius:2px;margin:0 auto 6px}
  .bar-label{font-size:9px;color:#334155;text-align:center;letter-spacing:0.12em;margin-bottom:20px}
  .preview-wrap{display:flex;flex-direction:column;align-items:center;gap:8px;margin-bottom:24px}
  .preview-label{font-size:10px;color:#475569;letter-spacing:0.1em}
  .preview-stage{width:440px;height:110px;position:relative;overflow:hidden}
  .preview-agent{position:absolute;bottom:0;image-rendering:pixelated}
  .controls{display:flex;gap:10px;justify-content:center}
  button{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.1em;color:#FF5722;background:rgba(255,87,34,0.08);border:1px solid rgba(255,87,34,0.25);border-radius:4px;padding:5px 14px;cursor:pointer}
  button:hover{background:rgba(255,87,34,0.15)}
  button.active{background:rgba(255,87,34,0.2);border-color:rgba(255,87,34,0.5)}
</style>

<div class="wrap">
<div class="frames-row" id="frames-row"></div>
<div class="bar-label">INPUT BAR</div>
<div class="bar"></div>

<div class="preview-wrap">
  <div class="preview-label">LIVE PREVIEW</div>
  <div class="preview-stage" id="stage">
    <canvas id="live" class="preview-agent" width="110" height="100"></canvas>
  </div>
  <div class="bar"></div>
  <div class="bar-label">INPUT BAR</div>
</div>

<div class="controls">
  <button id="btn-primary" class="active">SPIN LOOP</button>
  <button id="btn-walk">FLOAT</button>
  <button id="btn-idle">IDLE</button>
</div>
</div>

<script>
const P = 10;

const FRAMES = [
  {label:'F1',name:'idle',pixels:[[5,0,'#FF5722'],[4,1,'#FF5722'],[5,1,'#FF5722'],[6,1,'#FF5722'],[3,2,'#FF5722'],[4,2,'#FF5722'],[5,2,'#FF5722'],[6,2,'#FF5722'],[7,2,'#FF5722'],[2,3,'#FF5722'],[3,3,'#FF5722'],[4,3,'#FF5722'],[5,3,'#FF5722'],[6,3,'#FF5722'],[7,3,'#FF5722'],[8,3,'#FF5722'],[2,4,'#FF5722'],[3,4,'#FF5722'],[5,4,'#FF5722'],[7,4,'#FF5722'],[8,4,'#FF5722'],[2,5,'#FF5722'],[3,5,'#FF5722'],[4,5,'#FF5722'],[5,5,'#FF5722'],[6,5,'#FF5722'],[7,5,'#FF5722'],[8,5,'#FF5722'],[2,6,'#FF5722'],[3,6,'#FF5722'],[4,6,'#FF5722'],[6,6,'#FF5722'],[7,6,'#FF5722'],[8,6,'#FF5722'],[3,7,'#FF5722'],[4,7,'#FF5722'],[5,7,'#FF5722'],[6,7,'#FF5722'],[7,7,'#FF5722'],[4,8,'#FF5722'],[5,8,'#FF5722'],[6,8,'#FF5722'],[5,9,'#FF5722'],[4,4,'#FF8A65'],[6,4,'#FF8A65']]},
  {label:'F2',name:'tilt_left',pixels:[[5,0,'#FFFFFF'],[4,1,'#FFFFFF'],[5,1,'#FFFFFF'],[6,1,'#FFFFFF'],[3,2,'#FF5722'],[4,2,'#FF5722'],[5,2,'#FF5722'],[6,2,'#FF5722'],[7,2,'#FF5722'],[2,3,'#FF8A65'],[3,3,'#FF8A65'],[4,3,'#FF8A65'],[5,3,'#FF5722'],[6,3,'#BF360C'],[7,3,'#BF360C'],[8,3,'#BF360C'],[2,4,'#FF8A65'],[3,4,'#FF8A65'],[5,4,'#FF5722'],[7,4,'#BF360C'],[8,4,'#BF360C'],[2,5,'#FF8A65'],[3,5,'#FF8A65'],[4,5,'#FF8A65'],[5,5,'#FF5722'],[6,5,'#BF360C'],[7,5,'#BF360C'],[8,5,'#BF360C'],[2,6,'#FF8A65'],[3,6,'#FF8A65'],[4,6,'#FF8A65'],[6,6,'#BF360C'],[7,6,'#BF360C'],[8,6,'#BF360C'],[3,7,'#FF8A65'],[4,7,'#FF8A65'],[5,7,'#FF5722'],[6,7,'#BF360C'],[7,7,'#BF360C'],[4,8,'#FF5722'],[5,8,'#FF5722'],[6,8,'#FF5722'],[5,9,'#FF5722'],[4,4,'#FFD54F'],[6,4,'#FFD54F']]},
  {label:'F3',name:'flash',pixels:[[5,-1,'#FFFFFF'],[4,0,'#FFFFFF'],[5,0,'#FFFFFF'],[6,0,'#FFFFFF'],[3,1,'#FFFFFF'],[4,1,'#FFFFFF'],[5,1,'#FFFFFF'],[6,1,'#FFFFFF'],[7,1,'#FFFFFF'],[2,2,'#FFD54F'],[3,2,'#FFD54F'],[4,2,'#FFD54F'],[5,2,'#FFD54F'],[6,2,'#FFD54F'],[7,2,'#FFD54F'],[8,2,'#FFD54F'],[2,3,'#FFD54F'],[3,3,'#FFD54F'],[5,3,'#FFD54F'],[7,3,'#FFD54F'],[8,3,'#FFD54F'],[2,4,'#FFD54F'],[3,4,'#FFD54F'],[4,4,'#FFD54F'],[5,4,'#FFD54F'],[6,4,'#FFD54F'],[7,4,'#FFD54F'],[8,4,'#FFD54F'],[2,5,'#FF8A65'],[3,5,'#FF8A65'],[4,5,'#FF8A65'],[6,5,'#FF8A65'],[7,5,'#FF8A65'],[8,5,'#FF8A65'],[3,6,'#FF8A65'],[4,6,'#FF8A65'],[5,6,'#FF8A65'],[6,6,'#FF8A65'],[7,6,'#FF8A65'],[4,7,'#FF8A65'],[5,7,'#FF8A65'],[6,7,'#FF8A65'],[5,8,'#FF8A65'],[4,3,'#FFFFFF'],[6,3,'#FFFFFF']]},
  {label:'F4',name:'tilt_right',pixels:[[5,0,'#FFFFFF'],[4,1,'#FFFFFF'],[5,1,'#FFFFFF'],[6,1,'#FFFFFF'],[3,2,'#FF5722'],[4,2,'#FF5722'],[5,2,'#FF5722'],[6,2,'#FF5722'],[7,2,'#FF5722'],[2,3,'#BF360C'],[3,3,'#BF360C'],[4,3,'#BF360C'],[5,3,'#FF4081'],[6,3,'#FF8A65'],[7,3,'#FF8A65'],[8,3,'#FF8A65'],[2,4,'#BF360C'],[3,4,'#BF360C'],[5,4,'#FF4081'],[7,4,'#FF8A65'],[8,4,'#FF8A65'],[2,5,'#BF360C'],[3,5,'#BF360C'],[4,5,'#BF360C'],[5,5,'#FF4081'],[6,5,'#FF8A65'],[7,5,'#FF8A65'],[8,5,'#FF8A65'],[2,6,'#BF360C'],[3,6,'#BF360C'],[4,6,'#BF360C'],[6,6,'#FF8A65'],[7,6,'#FF8A65'],[8,6,'#FF8A65'],[3,7,'#BF360C'],[4,7,'#BF360C'],[5,7,'#FF5722'],[6,7,'#FF8A65'],[7,7,'#FF8A65'],[4,8,'#FF5722'],[5,8,'#FF5722'],[6,8,'#FF5722'],[5,9,'#FF5722'],[4,4,'#00E5FF'],[6,4,'#00E5FF']]},
  {label:'F5',name:'shimmer',pixels:[[5,0,'#FFD54F'],[4,1,'#FF5722'],[5,1,'#FFFFFF'],[6,1,'#FF5722'],[3,2,'#FF5722'],[4,2,'#FF5722'],[5,2,'#FFFFFF'],[6,2,'#FF5722'],[7,2,'#FF5722'],[2,3,'#FF5722'],[3,3,'#FF5722'],[4,3,'#00E5FF'],[5,3,'#00E5FF'],[6,3,'#00E5FF'],[7,3,'#FF5722'],[8,3,'#FF5722'],[2,4,'#FF5722'],[3,4,'#FF5722'],[5,4,'#00E5FF'],[7,4,'#FF5722'],[8,4,'#FF5722'],[2,5,'#FF5722'],[3,5,'#FF5722'],[4,5,'#00E5FF'],[5,5,'#00E5FF'],[6,5,'#00E5FF'],[7,5,'#FF5722'],[8,5,'#FF5722'],[2,6,'#BF360C'],[3,6,'#BF360C'],[4,6,'#BF360C'],[6,6,'#BF360C'],[7,6,'#BF360C'],[8,6,'#BF360C'],[3,7,'#BF360C'],[4,7,'#BF360C'],[5,7,'#BF360C'],[6,7,'#BF360C'],[7,7,'#BF360C'],[4,8,'#BF360C'],[5,8,'#BF360C'],[6,8,'#BF360C'],[5,9,'#BF360C'],[4,4,'#FF4081'],[6,4,'#FF4081']]}
];

function drawFrame(ctx, pixels) {
  ctx.clearRect(0,0,ctx.canvas.width,ctx.canvas.height);
  pixels.forEach(function(p) {
    var x=p[0], y=p[1], c=p[2];
    if(y<0||x<0) return;
    ctx.fillStyle = c;
    ctx.fillRect(x*P, y*P, P, P);
  });
}

// Static frame cards
var row = document.getElementById('frames-row');
FRAMES.forEach(function(f) {
  var col = document.createElement('div');
  col.className = 'frame-col';

  var lbl = document.createElement('div');
  lbl.className = 'frame-label';
  lbl.textContent = f.label;

  var cv = document.createElement('canvas');
  cv.width = 11*P; cv.height = 10*P;
  cv.style.cssText = 'width:'+11*P+'px;height:'+10*P+'px;image-rendering:pixelated';

  var nm = document.createElement('div');
  nm.className = 'frame-name';
  nm.textContent = f.name;

  col.appendChild(lbl);
  col.appendChild(cv);
  col.appendChild(nm);
  row.appendChild(col);

  drawFrame(cv.getContext('2d'), f.pixels);
});

// Live preview
var live = document.getElementById('live');
var liveCtx = live.getContext('2d');

var mode='primary', raf=null, lastTime=0, step=0;
var walkX=165, dir=1, idlePhase=0;

// Primary animation sequence
var PRIMARY_SEQ = [0,1,2,3,4,3,2,1,0];
var PRIMARY_DELAY = [400,120,80,120,160,120,80,120,400];

// Walk sequence
var WALK_SEQ = [1,2,3,2];
var WALK_DELAY = [150,150,150,150];

// Idle sequence
var IDLE_SEQ = [0,4,0,4];
var IDLE_DELAY = [1100,1100,1100,1100];

function setPos(x, bottom) {
  live.style.left = x + 'px';
  live.style.bottom = (bottom||4) + 'px';
}

function animPrimary(ts) {
  if(ts - lastTime > PRIMARY_DELAY[step]) {
    lastTime = ts;
    drawFrame(liveCtx, FRAMES[PRIMARY_SEQ[step]].pixels);
    step = (step+1) % PRIMARY_SEQ.length;
  }
  setPos(165);
  raf = requestAnimationFrame(animPrimary);
}

function animWalk(ts) {
  if(ts - lastTime > WALK_DELAY[step]) {
    lastTime = ts;
    drawFrame(liveCtx, FRAMES[WALK_SEQ[step]].pixels);
    step = (step+1) % WALK_SEQ.length;
    walkX += dir * 24;
    if(walkX > 310) dir = -1;
    if(walkX < 10) dir = 1;
  }
  setPos(walkX);
  raf = requestAnimationFrame(animWalk);
}

function animIdle(ts) {
  if(ts - lastTime > IDLE_DELAY[step]) {
    lastTime = ts;
    drawFrame(liveCtx, FRAMES[IDLE_SEQ[step]].pixels);
    step = (step+1) % IDLE_SEQ.length;
  }
  setPos(165);
  raf = requestAnimationFrame(animIdle);
}

function startAnim(m) {
  mode = m;
  if(raf) cancelAnimationFrame(raf);
  step=0; walkX=165; dir=1; idlePhase=0; lastTime=0;
  drawFrame(liveCtx, FRAMES[0].pixels);
  document.querySelectorAll('button').forEach(function(b){b.classList.remove('active')});
  if(m==='primary') document.getElementById('btn-primary').classList.add('active');
  if(m==='walk') document.getElementById('btn-walk').classList.add('active');
  if(m==='idle') document.getElementById('btn-idle').classList.add('active');
  if(m==='primary') raf = requestAnimationFrame(animPrimary);
  if(m==='walk') raf = requestAnimationFrame(animWalk);
  if(m==='idle') raf = requestAnimationFrame(animIdle);
}

document.getElementById('btn-primary').onclick = function(){startAnim('primary')};
document.getElementById('btn-walk').onclick = function(){startAnim('walk')};
document.getElementById('btn-idle').onclick = function(){startAnim('idle')};

setPos(165);
startAnim('primary');
</script>
