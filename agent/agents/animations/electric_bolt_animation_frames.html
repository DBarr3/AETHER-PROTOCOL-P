
<style>
  body{background:#0a0a0f}
  .wrap{padding:24px 16px;font-family:'IBM Plex Mono',monospace}
  .frames-row{display:flex;gap:20px;align-items:flex-end;justify-content:center;flex-wrap:wrap;margin-bottom:28px}
  .frame-col{display:flex;flex-direction:column;align-items:center;gap:8px}
  .frame-label{font-size:10px;color:#475569;letter-spacing:0.1em}
  .frame-name{font-size:9px;color:#5a4a00;text-align:center}
  canvas{image-rendering:pixelated;image-rendering:crisp-edges;display:block}
  .bar{width:440px;height:3px;background:#1e2030;border-radius:2px;margin:0 auto 6px}
  .bar-label{font-size:9px;color:#334155;text-align:center;letter-spacing:0.12em;margin-bottom:20px}
  .preview-wrap{display:flex;flex-direction:column;align-items:center;gap:8px;margin-bottom:24px}
  .preview-label{font-size:10px;color:#475569;letter-spacing:0.1em}
  .preview-stage{width:440px;height:110px;position:relative;overflow:hidden}
  .preview-bolt{position:absolute;image-rendering:pixelated}
  .controls{display:flex;gap:10px;justify-content:center}
  button{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.1em;color:#FFD600;background:rgba(255,214,0,0.06);border:1px solid rgba(255,214,0,0.25);border-radius:4px;padding:5px 14px;cursor:pointer}
  button:hover{background:rgba(255,214,0,0.14)}
  button.active{background:rgba(255,214,0,0.18);border-color:rgba(255,214,0,0.6)}
</style>

<div class="wrap">
<div class="frames-row" id="frames-row"></div>
<div class="bar-label">INPUT BAR</div>
<div class="bar"></div>

<div class="preview-wrap">
  <div class="preview-label">LIVE PREVIEW</div>
  <div class="preview-stage" id="stage">
    <canvas id="live" class="preview-bolt" width="110" height="110"></canvas>
  </div>
  <div class="bar"></div>
  <div class="bar-label">INPUT BAR</div>
</div>

<div class="controls">
  <button id="btn-zap" class="active">ZAP LOOP</button>
  <button id="btn-dash">DASH</button>
  <button id="btn-idle">IDLE</button>
</div>
</div>

<script>
const P   = 10;
const Y   = '#FFD600';  // main yellow
const W   = '#FFFFFF';  // white hot core
const O   = '#FF6D00';  // orange charge
const DY  = '#F9A825';  // dim yellow — flicker low
const CY  = '#FFFDE7';  // near-white — overcharge

// Base bolt pixels [x,y]  — all same color, we vary color per frame
const BASE_XY = [
  [4,0],[5,0],[6,0],[7,0],[8,0],
  [3,1],[4,1],[5,1],[6,1],[7,1],
  [2,2],[3,2],[4,2],[5,2],[6,2],
  [1,3],[2,3],[3,3],[4,3],[5,3],[6,3],[7,3],[8,3],
  [1,4],[2,4],[4,4],[5,4],[6,4],[8,4],
  [3,5],[4,5],[5,5],[6,5],[7,5],[8,5],[9,5],
  [4,6],[5,6],[6,6],[7,6],[8,6],
  [5,7],[6,7],[7,7],[8,7],[9,7],
  [6,8],[7,8],[8,8],[9,8],[10,8],
  [6,9],[10,9],
];

// Spark pixels scattered around bolt — shown in F4 (discharge burst)
const SPARKS = [
  [0,2],[1,1],[9,1],[10,2],
  [0,5],[1,6],[10,5],[9,6],
  [3,9],[5,10],[8,10],[11,7],
];

// Charge stripe — top half lights up in orange before discharge
const CHARGE_TOP = BASE_XY.filter(([x,y]) => y <= 4);
const CHARGE_BOT = BASE_XY.filter(([x,y]) => y > 4);

function makePixels(xys, color) {
  return xys.map(([x,y]) => [x,y,color]);
}

function shiftY(xys, dy) {
  return xys.map(([x,y,c]) => [x, y+dy, c]);
}

// F1 — IDLE: full bolt, normal yellow
const F1 = makePixels(BASE_XY, Y);

// F2 — CHARGE: top half orange/white, bottom dim — bolt "loading up"
const F2 = [
  ...makePixels(CHARGE_TOP, O),
  ...makePixels(CHARGE_BOT, DY),
];

// F3 — OVERCHARGE: entire bolt flares white-hot, shifts up 1px (recoil up)
const F3 = shiftY(makePixels(BASE_XY, CY), -1);

// F4 — DISCHARGE: bolt is gone (empty), sparks radiate outward
const F4 = makePixels(SPARKS, Y);

// F5 — REAPPEAR: bolt snaps back at normal pos, orange afterglow fading to yellow
const F5 = [
  ...makePixels(CHARGE_TOP, Y),
  ...makePixels(CHARGE_BOT, O),
];

const FRAMES = [
  { label:'F1', name:'idle',       pixels: F1 },
  { label:'F2', name:'charge',     pixels: F2 },
  { label:'F3', name:'overcharge', pixels: F3 },
  { label:'F4', name:'discharge',  pixels: F4 },
  { label:'F5', name:'reappear',   pixels: F5 },
];

function drawFrame(ctx, pixels) {
  ctx.clearRect(0,0,ctx.canvas.width,ctx.canvas.height);
  pixels.forEach(([x,y,c]) => {
    if(y<0||x<0) return;
    ctx.fillStyle = c;
    ctx.fillRect(x*P, y*P, P, P);
  });
}

// Static frame cards
const row = document.getElementById('frames-row');
FRAMES.forEach(f => {
  const col = document.createElement('div');
  col.className = 'frame-col';

  const lbl = document.createElement('div');
  lbl.className = 'frame-label';
  lbl.textContent = f.label;

  const cv = document.createElement('canvas');
  cv.width = 11*P; cv.height = 11*P;
  cv.style.cssText = `width:${11*P}px;height:${11*P}px;image-rendering:pixelated`;

  const nm = document.createElement('div');
  nm.className = 'frame-name';
  nm.textContent = f.name;

  col.appendChild(lbl);
  col.appendChild(cv);
  col.appendChild(nm);
  row.appendChild(col);

  drawFrame(cv.getContext('2d'), f.pixels);
});

// Live preview
const live    = document.getElementById('live');
const liveCtx = live.getContext('2d');

let mode='zap', raf=null, lastTime=0, step=0;
let walkX=165, dir=1, flickerPhase=0;

// Zap sequence: idle × 2 → charge → overcharge → discharge → reappear → idle
const ZAP_SEQ   = [0, 0, 1, 2, 3, 4, 0];
const ZAP_DELAY = [350,350,120,80,60,120,350];

// Flicker for idle: rapidly alternate Y and DY tones
let flickerPixels = [
  makePixels(BASE_XY, Y),
  makePixels(BASE_XY, DY),
  makePixels(BASE_XY, Y),
  makePixels(BASE_XY, CY),
];

function setPos(x, bottom) {
  live.style.left   = x + 'px';
  live.style.bottom = (bottom||4) + 'px';
}

function animZap(ts) {
  if(ts - lastTime > ZAP_DELAY[step]) {
    lastTime = ts;
    drawFrame(liveCtx, FRAMES[ZAP_SEQ[step]].pixels);
    step = (step+1) % ZAP_SEQ.length;
  }
  setPos(165);
  raf = requestAnimationFrame(animZap);
}

function animDash(ts) {
  if(ts - lastTime > 80) {
    lastTime = ts;
    // alternate between full and dim for speed-blur effect
    flickerPhase = (flickerPhase+1) % 2;
    drawFrame(liveCtx, flickerPhase === 0 ? F1 : F2);
    walkX += dir * 32;  // bolts move FAST
    if(walkX > 310) { dir=-1; }
    if(walkX < 10)  { dir=1;  }
  }
  setPos(walkX);
  raf = requestAnimationFrame(animDash);
}

function animIdle(ts) {
  if(ts - lastTime > 200) {
    lastTime = ts;
    // fast flicker between 3 brightness levels
    flickerPhase = (flickerPhase+1) % flickerPixels.length;
    drawFrame(liveCtx, flickerPixels[flickerPhase]);
  }
  setPos(165);
  raf = requestAnimationFrame(animIdle);
}

function startAnim(m) {
  mode=m;
  if(raf) cancelAnimationFrame(raf);
  step=0; walkX=165; dir=1; flickerPhase=0; lastTime=0;
  drawFrame(liveCtx, F1);
  document.querySelectorAll('button').forEach(b=>b.classList.remove('active'));
  document.getElementById('btn-'+m).classList.add('active');
  if(m==='zap')  raf = requestAnimationFrame(animZap);
  if(m==='dash') raf = requestAnimationFrame(animDash);
  if(m==='idle') raf = requestAnimationFrame(animIdle);
}

document.getElementById('btn-zap').onclick  = () => startAnim('zap');
document.getElementById('btn-dash').onclick = () => startAnim('dash');
document.getElementById('btn-idle').onclick = () => startAnim('idle');

setPos(165);
startAnim('zap');
</script>
