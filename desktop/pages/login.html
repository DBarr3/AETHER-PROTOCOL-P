<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AetherCloud-L</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --bg-2: #111111;
    --bg-3: #1a1a1a;
    --bg-4: #222222;
    --border: #2a2a2a;
    --border-2: #333333;
    --text-primary: #efefef;
    --text-secondary: #888888;
    --text-muted: #444444;
    --accent: #00d4ff;
    --accent-dim: rgba(0,212,255,0.08);
    --accent-glow: rgba(0,212,255,0.2);
    --green: #22c55e;
    --green-dim: rgba(34,197,94,0.1);
    --amber: #f59e0b;
    --red: #ef4444;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text-primary);
    font-family: 'Inter', sans-serif;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  /* Subtle grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 48px 48px;
    opacity: 0.3;
    pointer-events: none;
    z-index: 0;
  }

  /* Electron frameless title bar */
  .title-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 32px;
    background: var(--bg-2);
    display: flex;
    align-items: center;
    -webkit-app-region: drag;
    z-index: 200;
    border-bottom: 1px solid var(--border);
  }
  .title-bar-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 400;
    color: var(--text-muted);
    letter-spacing: 0.5px;
    padding-left: 12px;
    flex: 1;
  }
  .title-bar-controls {
    display: flex;
    -webkit-app-region: no-drag;
  }
  .title-bar-btn {
    width: 40px;
    height: 32px;
    border: none;
    background: none;
    color: var(--text-muted);
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, color 0.15s;
  }
  .title-bar-btn:hover { background: var(--bg-4); color: var(--text-primary); }
  .title-bar-btn.close:hover { background: var(--red); color: white; }

  /* Login wrapper */
  .login-wrap {
    position: relative;
    z-index: 10;
    width: 360px;
  }

  /* Logo / header */
  .lock-center {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 24px;
  }

  .lock-icon-wrap {
    width: 40px;
    height: 40px;
    border: 1px solid var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--accent-dim);
  }

  .app-title {
    font-family: 'Inter', sans-serif;
    font-size: 20px;
    font-weight: 600;
    color: var(--text-primary);
    margin-top: 14px;
    letter-spacing: 0;
  }
  .app-tagline {
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 400;
    color: var(--text-muted);
    margin-top: 4px;
  }

  /* Login form card */
  .login-form {
    background: var(--bg-2);
    border: 1px solid var(--border-2);
    padding: 28px;
  }

  .field {
    margin-bottom: 16px;
  }
  .field label {
    display: block;
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 500;
    color: var(--text-muted);
    letter-spacing: 0.5px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .field input {
    width: 100%;
    background: var(--bg-3);
    border: 1px solid var(--border-2);
    border-radius: 0;
    color: var(--text-primary);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 400;
    padding: 10px 12px;
    outline: none;
    transition: border-color 0.15s;
  }
  .field input:focus {
    border-color: var(--accent);
  }
  .field input::placeholder {
    color: var(--text-muted);
    font-size: 13px;
  }

  .field-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    margin-bottom: 20px;
  }
  .remember-check {
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--text-secondary);
    cursor: pointer;
  }
  .remember-check input { accent-color: var(--accent); }
  .forgot-link {
    color: var(--text-secondary);
    cursor: pointer;
    transition: color 0.15s;
  }
  .forgot-link:hover { color: var(--text-primary); }

  .login-btn {
    width: 100%;
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: 0;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0;
    padding: 12px;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .login-btn:hover {
    opacity: 0.9;
  }
  .login-btn.loading {
    background: var(--bg-3);
    color: var(--text-secondary);
    border: 1px solid var(--border-2);
    cursor: not-allowed;
    opacity: 1;
  }

  .login-status {
    margin-top: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 400;
    text-align: center;
    min-height: 16px;
    color: var(--text-muted);
  }
  .login-status.error { color: var(--red); }
  .login-status.ok { color: var(--green); }
  .login-status.info { color: var(--text-secondary); }

  /* Protocol status bar */
  .protocol-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px solid var(--border-2);
  }
  .protocol-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    font-weight: 400;
    color: var(--text-muted);
    letter-spacing: 0;
  }
  .protocol-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--border-2);
  }
  .protocol-dot.on { background: var(--green); }
  .protocol-dot.amber { background: var(--amber); }
  .protocol-dot.quantum { background: var(--accent); }

  /* Loading dots */
  .loading-dots::after {
    content: '';
    animation: dots 1.2s steps(4, end) infinite;
  }
  @keyframes dots {
    0%   { content: ''; }
    25%  { content: '.'; }
    50%  { content: '..'; }
    75%  { content: '...'; }
    100% { content: ''; }
  }
</style>
</head>
<body>

<!-- Electron title bar -->
<div class="title-bar" id="title-bar">
  <span class="title-bar-text">AetherCloud-L</span>
  <div class="title-bar-controls">
    <button class="title-bar-btn" onclick="window.aether?.minimize()">─</button>
    <button class="title-bar-btn close" onclick="window.aether?.close()">✕</button>
  </div>
</div>

<div class="login-wrap">
  <!-- Logo -->
  <div class="lock-center">
    <div class="lock-icon-wrap">
      <svg width="20" height="20" viewBox="0 0 32 32" fill="none">
        <rect x="6" y="14" width="20" height="14" rx="1" stroke="#00d4ff" stroke-width="1.5"/>
        <path d="M10 14V10a6 6 0 0112 0v4" stroke="#00d4ff" stroke-width="1.5" fill="none"/>
        <circle cx="16" cy="21" r="2" fill="#00d4ff"/>
        <line x1="16" y1="23" x2="16" y2="26" stroke="#00d4ff" stroke-width="1.5"/>
      </svg>
    </div>
    <div class="app-title">AetherCloud-L</div>
    <div class="app-tagline">Quantum-secured file intelligence</div>
  </div>

  <!-- Form -->
  <div class="login-form">
    <div class="field">
      <label>Vault Identifier</label>
      <input type="text" id="username" placeholder="Enter username" autocomplete="off">
    </div>
    <div class="field">
      <label>Access Key</label>
      <input type="password" id="password" placeholder="••••••••••••" autocomplete="off" onkeydown="if(event.key==='Enter')handleLogin()">
    </div>
    <div class="field-row">
      <label class="remember-check">
        <input type="checkbox"> Keep session active
      </label>
      <span class="forgot-link">Reset key</span>
    </div>

    <button class="login-btn" id="login-btn" onclick="handleLogin()">
      Authenticate
    </button>

    <div class="login-status" id="login-status"></div>

    <div class="protocol-bar">
      <div class="protocol-item">
        <div class="protocol-dot on"></div>
        Protocol-L
      </div>
      <div class="protocol-item">
        <div class="protocol-dot quantum"></div>
        Quantum Seed
      </div>
      <div class="protocol-item">
        <div class="protocol-dot amber"></div>
        Vault Watcher
      </div>
    </div>
  </div>
</div>

<script>
// Login handler — calls Python FastAPI backend
async function handleLogin() {
  const user = document.getElementById('username').value.trim();
  const pass = document.getElementById('password').value;
  const btn = document.getElementById('login-btn');
  const status = document.getElementById('login-status');

  if (!user || !pass) {
    status.className = 'login-status error';
    status.textContent = '⚠ VAULT IDENTIFIER AND ACCESS KEY REQUIRED';
    return;
  }

  btn.className = 'login-btn loading';
  btn.textContent = 'AUTHENTICATING';
  status.className = 'login-status info loading-dots';
  status.textContent = 'VERIFYING CREDENTIALS';

  try {
    // Check if API is available
    if (window.aetherAPI) {
      status.textContent = 'CONNECTING TO PROTOCOL-L ENGINE';

      const result = await window.aetherAPI.login(user, pass);

      if (result.error) {
        status.className = 'login-status error';
        status.textContent = '⚠ SERVER UNAVAILABLE — ' + result.message;
        btn.className = 'login-btn';
        btn.textContent = 'AUTHENTICATE';
        return;
      }

      if (result.authenticated) {
        // Store session token for the app page
        sessionStorage.setItem('session_token', result.session_token);
        sessionStorage.setItem('commitment_hash', result.commitment_hash || '');
        sessionStorage.setItem('username', user);

        status.textContent = 'QUANTUM SESSION TOKEN GENERATED';
        await sleep(200);

        status.className = 'login-status ok';
        status.textContent = '✓ SESSION AUTHENTICATED — LOADING VAULT';
        await sleep(300);

        if (window.aether) { window.aether.navigate('app'); } else { window.location.href = 'app.html'; }
      } else {
        status.className = 'login-status error';
        status.textContent = '⚠ AUTHENTICATION FAILED — ' + (result.reason || 'INVALID CREDENTIALS');
        btn.className = 'login-btn';
        btn.textContent = 'AUTHENTICATE';
      }
    } else {
      // Fallback: no API available (standalone browser mode)
      await sleep(400);
      status.textContent = 'GENERATING QUANTUM SESSION TOKEN';
      await sleep(500);
      status.textContent = 'INITIALIZING PROTOCOL-L ENGINE';
      await sleep(400);
      status.textContent = 'STARTING VAULT WATCHER';
      await sleep(300);

      sessionStorage.setItem('session_token', 'demo_token_' + Date.now());
      sessionStorage.setItem('username', user);

      status.className = 'login-status ok';
      status.textContent = '✓ SESSION AUTHENTICATED — LOADING VAULT';
      await sleep(600);
      if (window.aether) { window.aether.navigate('app'); } else { window.location.href = 'app.html'; }
    }
  } catch (err) {
    status.className = 'login-status error';
    status.textContent = '⚠ CONNECTION ERROR — ' + err.message;
    btn.className = 'login-btn';
    btn.textContent = 'AUTHENTICATE';
  }
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// Check backend status on load
window.addEventListener('load', async () => {
  if (window.aetherAPI) {
    const status = await window.aetherAPI.getStatus();
    if (!status.error) {
      // Update protocol indicators
      const dots = document.querySelectorAll('.protocol-dot');
      if (dots.length >= 1) dots[0].style.background = '#00ff88'; // Protocol-L ACTIVE
    }
  }
});
</script>
</body>
</html>
