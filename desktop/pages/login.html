<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AetherCloud-L</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --bg-2: #111111;
    --bg-3: #1a1a1a;
    --bg-4: #222222;
    --border: #2a2a2a;
    --border-2: #333333;
    --text-primary: #efefef;
    --text-secondary: #888888;
    --text-muted: #444444;
    --accent: #00d4ff;
    --accent-dim: rgba(0,212,255,0.08);
    --green: #22c55e;
    --amber: #f59e0b;
    --red: #ef4444;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text-primary);
    font-family: 'Inter', sans-serif;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 48px 48px;
    opacity: 0.3;
    pointer-events: none;
    z-index: 0;
  }

  .title-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 32px;
    background: var(--bg-2);
    display: flex;
    align-items: center;
    -webkit-app-region: drag;
    z-index: 200;
    border-bottom: 1px solid var(--border);
  }
  .title-bar-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.5px;
    padding-left: 12px;
    flex: 1;
  }
  .title-bar-controls { display: flex; -webkit-app-region: no-drag; }
  .title-bar-btn {
    width: 40px; height: 32px;
    border: none; background: none;
    color: var(--text-muted); font-size: 14px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, color 0.15s;
  }
  .title-bar-btn:hover { background: var(--bg-4); color: var(--text-primary); }
  .title-bar-btn.close:hover { background: var(--red); color: white; }

  .login-wrap {
    position: relative;
    z-index: 10;
    width: 360px;
  }

  .lock-center {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 24px;
  }
  .lock-icon-wrap {
    width: 40px; height: 40px;
    border: 1px solid var(--accent);
    display: flex; align-items: center; justify-content: center;
    background: var(--accent-dim);
  }
  .app-title {
    font-size: 20px; font-weight: 600;
    color: var(--text-primary); margin-top: 14px;
  }
  .app-tagline {
    font-size: 12px; color: var(--text-muted); margin-top: 4px;
  }

  .login-form {
    background: var(--bg-2);
    border: 1px solid var(--border-2);
    padding: 28px;
  }
  .field { margin-bottom: 16px; }
  .field label {
    display: block;
    font-size: 11px; font-weight: 500;
    color: var(--text-muted);
    letter-spacing: 0.5px; text-transform: uppercase;
    margin-bottom: 6px;
  }
  .field input {
    width: 100%;
    background: var(--bg-3);
    border: 1px solid var(--border-2);
    border-radius: 0;
    color: var(--text-primary);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    padding: 10px 12px;
    outline: none;
    transition: border-color 0.15s;
  }
  .field input:focus { border-color: var(--accent); }
  .field input::placeholder { color: var(--text-muted); font-size: 13px; }

  .field-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 11px;
    margin-bottom: 20px;
  }
  .remember-check {
    display: flex; align-items: center; gap: 6px;
    color: var(--text-secondary); cursor: pointer;
  }
  .remember-check input { accent-color: var(--accent); }
  .forgot-link {
    color: var(--text-secondary); cursor: pointer;
    transition: color 0.15s;
  }
  .forgot-link:hover { color: var(--text-primary); }

  .login-btn {
    width: 100%;
    background: var(--accent);
    color: var(--bg);
    border: none; border-radius: 0;
    font-family: 'Inter', sans-serif;
    font-size: 13px; font-weight: 600;
    padding: 12px; cursor: pointer;
    transition: opacity 0.15s;
  }
  .login-btn:hover { opacity: 0.9; }
  .login-btn.loading {
    background: var(--bg-3);
    color: var(--text-secondary);
    border: 1px solid var(--border-2);
    cursor: not-allowed;
  }

  .login-status {
    margin-top: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    text-align: center;
    min-height: 16px;
    color: var(--text-muted);
  }
  .login-status.error { color: var(--red); }
  .login-status.ok { color: var(--green); }
  .login-status.info { color: var(--text-secondary); }

  .protocol-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px solid var(--border-2);
  }
  .protocol-item {
    display: flex; align-items: center; gap: 5px;
    font-size: 10px; color: var(--text-muted);
  }
  .protocol-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--border-2);
  }
  .protocol-dot.on { background: var(--green); }
  .protocol-dot.amber { background: var(--amber); }
  .protocol-dot.quantum { background: var(--accent); }
</style>
</head>
<body>

<div class="title-bar">
  <span class="title-bar-text">AetherCloud-L v0.8.6</span>
  <div class="title-bar-controls">
    <button class="title-bar-btn" onclick="window.aether?.minimize()">─</button>
    <button class="title-bar-btn close" onclick="window.aether?.close()">✕</button>
  </div>
</div>

<div class="login-wrap">
  <div class="lock-center">
    <div class="lock-icon-wrap">
      <svg width="20" height="20" viewBox="0 0 32 32" fill="none">
        <rect x="6" y="14" width="20" height="14" rx="1" stroke="#00d4ff" stroke-width="1.5"/>
        <path d="M10 14V10a6 6 0 0112 0v4" stroke="#00d4ff" stroke-width="1.5" fill="none"/>
        <circle cx="16" cy="21" r="2" fill="#00d4ff"/>
        <line x1="16" y1="23" x2="16" y2="26" stroke="#00d4ff" stroke-width="1.5"/>
      </svg>
    </div>
    <div class="app-title">AetherCloud-L</div>
    <div class="app-tagline">Quantum-secured file intelligence</div>
  </div>

  <div class="login-form">
    <div class="field">
      <label>Vault Identifier</label>
      <input type="text" id="username" placeholder="Enter username" autocomplete="off">
    </div>
    <div class="field">
      <label>Access Key</label>
      <input type="password" id="password" placeholder="••••••••••••" autocomplete="off"
             onkeydown="if(event.key==='Enter')handleLogin()">
    </div>
    <div class="field-row">
      <label class="remember-check">
        <input type="checkbox"> Keep session active
      </label>
      <span class="forgot-link">Reset key</span>
    </div>

    <button class="login-btn" id="login-btn" onclick="handleLogin()">Authenticate</button>
    <div class="login-status" id="login-status"></div>

    <div class="protocol-bar">
      <div class="protocol-item"><div class="protocol-dot on"></div>Protocol-L</div>
      <div class="protocol-item"><div class="protocol-dot quantum"></div>Quantum Seed</div>
      <div class="protocol-item"><div class="protocol-dot amber" id="dot-vps"></div>VPS2</div>
    </div>
  </div>
</div>

<script>
async function handleLogin() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;

  if (!username || !password) {
    showStatus('VAULT IDENTIFIER AND ACCESS KEY REQUIRED', 'error');
    return;
  }

  showStatus('AUTHENTICATING...', 'info');
  setLoading(true);

  try {
    let result;
    if (window.aetherAPI?.login) {
      result = await window.aetherAPI.login(username, password);
    } else {
      const r = await fetch('http://198.211.115.41:8080/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password }),
      });
      result = await r.json();
    }

    if (result.error) {
      showStatus('SERVER UNAVAILABLE — ' + (result.message || 'connection failed'), 'error');
      setLoading(false);
      return;
    }

    if (result.authenticated || result.success || result.session_token || result.token) {
      const token = result.session_token || result.token || 'active';
      sessionStorage.setItem('session_token', token);
      sessionStorage.setItem('commitment_hash', result.commitment_hash || '');
      sessionStorage.setItem('username', username);

      showStatus('SESSION AUTHENTICATED — LOADING VAULT', 'ok');
      await new Promise(r => setTimeout(r, 500));

      if (window.aether?.navigate) {
        window.aether.navigate('dashboard');
      } else {
        window.location.href = 'dashboard.html';
      }
    } else {
      const msg = result.reason || result.detail || 'INVALID CREDENTIALS';
      showStatus('AUTHENTICATION FAILED — ' + msg, 'error');
      setLoading(false);
    }
  } catch (e) {
    showStatus('CANNOT REACH VPS2 — ' + e.message, 'error');
    setLoading(false);
  }
}

function setLoading(on) {
  const btn = document.getElementById('login-btn');
  if (!btn) return;
  btn.disabled = on;
  btn.className = on ? 'login-btn loading' : 'login-btn';
  btn.textContent = on ? 'AUTHENTICATING...' : 'Authenticate';
}

function showStatus(msg, type) {
  const el = document.getElementById('login-status');
  if (!el) return;
  el.className = 'login-status ' + (type || '');
  el.textContent = (type === 'error' ? '⚠ ' : type === 'ok' ? '✓ ' : '') + msg;
}

// Check VPS connectivity on load
window.addEventListener('load', async () => {
  const dot = document.getElementById('dot-vps');
  try {
    let data;
    if (window.aetherAPI?.getStatus) {
      data = await window.aetherAPI.getStatus();
    } else {
      const r = await fetch('http://198.211.115.41:8080/status', {
        signal: AbortSignal.timeout(5000),
      });
      data = await r.json();
    }
    if (data && !data.error) {
      if (dot) dot.style.background = '#22c55e';
    } else {
      if (dot) dot.style.background = '#ef4444';
      showStatus('VPS2 RETURNED ERROR — CHECK SERVER', 'error');
    }
  } catch {
    if (dot) dot.style.background = '#ef4444';
    showStatus('VPS2 UNREACHABLE — CHECK CONNECTION', 'error');
  }
});
</script>
</body>
</html>
