<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aether AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --bg-2: #111111;
    --bg-3: #1a1a1a;
    --bg-4: #222222;
    --border: #2a2a2a;
    --border-2: #333333;
    --text-primary: #efefef;
    --text-secondary: #888888;
    --text-muted: #444444;
    --accent: #00d4ff;
    --accent-dim: rgba(0,212,255,0.08);
    --green: #22c55e;
    --amber: #f59e0b;
    --red: #ef4444;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text-primary);
    font-family: 'Inter', sans-serif;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 48px 48px;
    opacity: 0.3;
    pointer-events: none;
    z-index: 0;
  }

  .title-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 32px;
    background: var(--bg-2);
    display: flex;
    align-items: center;
    -webkit-app-region: drag;
    z-index: 200;
    border-bottom: 1px solid var(--border);
  }
  .title-bar-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.5px;
    padding-left: 12px;
    flex: 1;
  }
  .title-bar-controls { display: flex; -webkit-app-region: no-drag; }
  .title-bar-btn {
    width: 40px; height: 32px;
    border: none; background: none;
    color: var(--text-muted); font-size: 14px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, color 0.15s;
  }
  .title-bar-btn:hover { background: var(--bg-4); color: var(--text-primary); }
  .title-bar-btn.close:hover { background: var(--red); color: white; }

  .login-wrap {
    position: relative;
    z-index: 10;
    width: 360px;
  }

  .lock-center {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 24px;
  }
  .lock-icon-wrap {
    width: 40px; height: 40px;
    border: 1px solid var(--accent);
    display: flex; align-items: center; justify-content: center;
    background: var(--accent-dim);
  }
  .app-title {
    font-size: 20px; font-weight: 600;
    color: var(--text-primary); margin-top: 14px;
  }
  .app-tagline {
    font-size: 12px; color: var(--text-muted); margin-top: 4px;
  }

  .login-form {
    background: var(--bg-2);
    border: 1px solid var(--border-2);
    padding: 28px;
  }
  .field { margin-bottom: 16px; }
  .field label {
    display: block;
    font-size: 11px; font-weight: 500;
    color: var(--text-muted);
    letter-spacing: 0.5px; text-transform: uppercase;
    margin-bottom: 6px;
  }
  .field input {
    width: 100%;
    background: var(--bg-3);
    border: 1px solid var(--border-2);
    border-radius: 0;
    color: var(--text-primary);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    padding: 10px 12px;
    outline: none;
    transition: border-color 0.15s;
  }
  .field input:focus { border-color: var(--accent); }
  .field input::placeholder { color: var(--text-muted); font-size: 13px; }

  .field-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 11px;
    margin-bottom: 20px;
  }
  .remember-check {
    display: flex; align-items: center; gap: 6px;
    color: var(--text-secondary); cursor: pointer;
  }
  .remember-check input { accent-color: var(--accent); }
  .forgot-link {
    color: var(--text-secondary); cursor: pointer;
    transition: color 0.15s;
  }
  .forgot-link:hover { color: var(--text-primary); }

  .login-btn {
    width: 100%;
    background: var(--accent);
    color: var(--bg);
    border: none; border-radius: 0;
    font-family: 'Inter', sans-serif;
    font-size: 13px; font-weight: 600;
    padding: 12px; cursor: pointer;
    transition: opacity 0.15s;
  }
  .login-btn:hover { opacity: 0.9; }
  .login-btn.loading {
    background: var(--bg-3);
    color: var(--text-secondary);
    border: 1px solid var(--border-2);
    cursor: not-allowed;
  }

  .login-status {
    margin-top: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    text-align: center;
    min-height: 16px;
    color: var(--text-muted);
  }
  .login-status.error { color: var(--red); }
  .login-status.ok { color: var(--green); }
  .login-status.info { color: var(--text-secondary); }

  .protocol-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 20px;
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px solid var(--border-2);
  }
  .protocol-item {
    display: flex; align-items: center; gap: 5px;
    font-size: 10px; color: var(--text-muted);
  }
  .protocol-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--border-2);
  }
  .protocol-dot.on { background: var(--green); }
  .protocol-dot.amber { background: var(--amber); }
  .protocol-dot.quantum { background: var(--accent); }

  /* ── Update banner ───────────────────────────────── */
  #update-banner {
    display: none;
    position: fixed;
    top: 32px; left: 0; right: 0;
    z-index: 100;
    background: linear-gradient(90deg, #1a1200, #1a0a00);
    border-bottom: 1px solid var(--amber);
    padding: 7px 16px;
    align-items: center;
    gap: 10px;
  }
  #update-banner.visible { display: flex; }
  .update-banner-icon {
    width: 14px; height: 14px; flex-shrink: 0;
    border-radius: 50%;
    background: var(--amber);
    display: flex; align-items: center; justify-content: center;
  }
  .update-banner-text {
    flex: 1;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--amber);
    letter-spacing: 0.3px;
  }
  .update-banner-text strong { color: #fcd34d; }
  .update-banner-btn {
    background: var(--amber);
    color: #0a0a0a;
    border: none;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px; font-weight: 700;
    padding: 4px 10px;
    cursor: pointer;
    letter-spacing: 0.5px;
    white-space: nowrap;
    transition: opacity 0.15s;
  }
  .update-banner-btn:hover { opacity: 0.85; }
  .update-banner-dismiss {
    background: none; border: none;
    color: var(--text-muted); font-size: 14px;
    cursor: pointer; padding: 0 2px; line-height: 1;
    transition: color 0.15s;
  }
  .update-banner-dismiss:hover { color: var(--text-secondary); }
</style>
</head>
<body>

<!-- Update banner — shown when running an outdated version -->
<div id="update-banner">
  <div class="update-banner-icon"></div>
  <div class="update-banner-text">
    <strong>UPDATE AVAILABLE</strong> &mdash;
    You are running <span id="update-current-ver">v?</span>,
    latest is <span id="update-latest-ver">v?</span>
  </div>
  <button class="update-banner-btn" onclick="window.aether?.openDownload()">DOWNLOAD NOW</button>
  <button class="update-banner-dismiss" title="Dismiss" onclick="document.getElementById('update-banner').classList.remove('visible')">&#10005;</button>
</div>

<div class="title-bar">
  <span class="title-bar-text" id="title-bar-version">Aether AI</span>
  <div class="title-bar-controls">
    <button class="title-bar-btn" onclick="window.aether?.minimize()">&#8212;</button>
    <button class="title-bar-btn close" onclick="window.aether?.close()">&#10005;</button>
  </div>
</div>

<div class="login-wrap">
  <div class="lock-center">
    <div class="lock-icon-wrap">
      <svg width="20" height="20" viewBox="0 0 32 32" fill="none">
        <rect x="6" y="14" width="20" height="14" rx="1" stroke="#00d4ff" stroke-width="1.5"/>
        <path d="M10 14V10a6 6 0 0112 0v4" stroke="#00d4ff" stroke-width="1.5" fill="none"/>
        <circle cx="16" cy="21" r="2" fill="#00d4ff"/>
        <line x1="16" y1="23" x2="16" y2="26" stroke="#00d4ff" stroke-width="1.5"/>
      </svg>
    </div>
    <div class="app-title">Aether AI</div>
    <div class="app-tagline">Quantum-secured file intelligence</div>
  </div>

  <div class="login-form">
    <!-- License key field — shown on first-time setup; hidden after first successful auth -->
    <div class="field" id="license-field" style="display:none;">
      <label>License Key</label>
      <input type="text" id="license-key" placeholder="AETH-CLD-XXXX-XXXX-XXXX" autocomplete="off"
             style="font-family:'JetBrains Mono',monospace;letter-spacing:0.5px;font-size:12px;"
             onkeydown="if(event.key==='Enter')handleLogin()">
    </div>
    <div class="field">
      <label>Vault Identifier</label>
      <input type="text" id="username" placeholder="Enter username" autocomplete="off">
    </div>
    <div class="field">
      <label>Access Key</label>
      <input type="password" id="password" placeholder="&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;" autocomplete="off"
             onkeydown="if(event.key==='Enter')handleLogin()">
    </div>
    <div class="field-row">
      <label class="remember-check">
        <input type="checkbox" id="remember-me" checked> Keep session active
      </label>
      <span class="forgot-link">Reset key</span>
    </div>

    <button class="login-btn" id="login-btn" onclick="handleLogin()">Authenticate</button>
    <div class="login-status" id="login-status"></div>

    <div class="protocol-bar">
      <div class="protocol-item"><div class="protocol-dot on"></div>Protocol-C</div>
      <div class="protocol-item"><div class="protocol-dot on"></div>Commitment</div>
      <div class="protocol-item"><div class="protocol-dot amber" id="dot-vps"></div>VPS2</div>
      <div class="protocol-item"><div class="protocol-dot" id="dot-auth"></div>Auth</div>
    </div>
  </div>
</div>

<script>
// ── Helper: fetch with explicit timeout ──────────
async function fetchWithTimeout(url, timeoutMs, options = {}) {
  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), timeoutMs);
  try {
    const res = await fetch(url, { ...options, signal: controller.signal });
    clearTimeout(timeout);
    return res;
  } catch (err) {
    clearTimeout(timeout);
    if (err.name === 'AbortError') throw new Error(`Request timed out after ${timeoutMs}ms`);
    throw err;
  }
}

// Resolve API base — try IPC first, fallback to VPS1 HTTPS proxy
async function getApiBase() {
  if (window.aether?.apiBase) return window.aether.apiBase;
  return 'https://api.aethersystems.net/cloud';
}

// ── Whether license key field is currently visible (first-time setup) ──
let _firstTimeSetup = false;

async function handleLogin() {
  const username    = document.getElementById('username').value.trim();
  const password    = document.getElementById('password').value;
  const rememberMe  = document.getElementById('remember-me').checked;
  const licenseKey  = _firstTimeSetup
    ? document.getElementById('license-key').value.trim()
    : (await window.aetherAPI?.authGet?.())?.licenseKey || '';

  if (!username || !password) {
    showStatus('VAULT IDENTIFIER AND ACCESS KEY REQUIRED', 'error');
    return;
  }

  // On first-time setup, license key is mandatory
  if (_firstTimeSetup && !licenseKey) {
    showStatus('LICENSE KEY REQUIRED FOR FIRST-TIME SETUP', 'error');
    document.getElementById('license-key').focus();
    return;
  }

  showStatus('AUTHENTICATING...', 'info');
  setLoading(true);

  const API_BASE = await getApiBase();

  try {
    let result;
    const payload = { username, password };
    if (licenseKey) payload.license_key = licenseKey;

    if (window.aetherAPI?.login) {
      result = await window.aetherAPI.login(username, password, licenseKey || undefined);
    } else {
      const r = await fetchWithTimeout(`${API_BASE}/auth/login`, 10000, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      result = await r.json();
    }

    if (result.error) {
      showStatus('SERVER UNAVAILABLE — ' + (result.message || 'connection failed'), 'error');
      setLoading(false);
      return;
    }

    if (result.authenticated && result.session_token) {
      // Persist to electron-store — NEVER store the plaintext password
      if (window.aetherAPI?.authSet) {
        await window.aetherAPI.authSet({
          sessionToken: rememberMe ? result.session_token : null,
          userId:       rememberMe ? username : null,
          rememberMe,
          lastLogin:    new Date().toISOString(),
          licenseKey:   licenseKey || undefined,
          plan:         result.plan || undefined,
        });
      }
      // Keep localStorage for same-window session (cleared on tab/window close if !rememberMe)
      if (rememberMe) {
        localStorage.setItem('aether_session', result.session_token);
        localStorage.setItem('aether_user', username);
      } else {
        sessionStorage.setItem('aether_session', result.session_token);
        sessionStorage.setItem('aether_user', username);
        localStorage.removeItem('aether_session');
        localStorage.removeItem('aether_user');
      }
      localStorage.setItem('aether_commitment', result.commitment_hash || '');

      showStatus('SESSION AUTHENTICATED — LOADING VAULT', 'ok');
      await new Promise(r => setTimeout(r, 500));

      if (window.aether?.navigate) {
        window.aether.navigate('dashboard');
      } else {
        window.location.href = 'dashboard.html';
      }
    } else {
      const reason = result.reason || result.detail || 'INVALID CREDENTIALS';
      let msg = 'AUTHENTICATION FAILED';
      if (reason === 'USER_NOT_FOUND')      msg = 'USER NOT FOUND — CHECK VAULT IDENTIFIER';
      else if (reason === 'INVALID_PASSWORD') msg = 'INVALID ACCESS KEY';
      else if (reason === 'ACCOUNT_LOCKED')   msg = 'ACCOUNT LOCKED — TOO MANY ATTEMPTS';
      else if (reason === 'LICENSE_INVALID')  msg = 'INVALID LICENSE KEY';
      else if (reason === 'LICENSE_EXPIRED')  msg = 'LICENSE EXPIRED — RENEW AT aethersystems.io';
      else msg += ' — ' + reason;
      showStatus(msg, 'error');
      setLoading(false);
    }
  } catch (e) {
    showStatus('CANNOT REACH BACKEND — ' + e.message, 'error');
    setLoading(false);
  }
}

function setLoading(on) {
  const btn = document.getElementById('login-btn');
  if (!btn) return;
  btn.disabled = on;
  btn.className = on ? 'login-btn loading' : 'login-btn';
  btn.textContent = on ? 'AUTHENTICATING...' : 'Authenticate';
}

function showStatus(msg, type) {
  const el = document.getElementById('login-status');
  if (!el) return;
  el.className = 'login-status ' + (type || '');
  el.textContent = msg;
}

// ── Session restore — if rememberMe was set and token still valid, skip login ──
async function tryRestoreSession() {
  try {
    if (!window.aetherAPI?.authGet) return false;
    const auth = await window.aetherAPI.authGet();
    if (!auth?.rememberMe || !auth?.sessionToken || !auth?.userId) return false;

    showStatus('Restoring session...', 'info');
    const API_BASE = await getApiBase();
    const r = await fetchWithTimeout(`${API_BASE}/auth/verify`, 5000, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${auth.sessionToken}` },
      body: JSON.stringify({ session_token: auth.sessionToken }),
    });
    const result = await r.json();
    if (result.valid) {
      localStorage.setItem('aether_session', auth.sessionToken);
      localStorage.setItem('aether_user', auth.userId);
      showStatus('SESSION RESTORED — LOADING VAULT', 'ok');
      await new Promise(res => setTimeout(res, 400));
      if (window.aether?.navigate) window.aether.navigate('dashboard');
      else window.location.href = 'dashboard.html';
      return true;
    }
    // Token expired — clear it silently so user re-authenticates
    await window.aetherAPI.authSet({ sessionToken: null });
    return false;
  } catch (_) {
    return false;
  }
}

// ── Init: connection health check ───────────────
async function initLoginScreen() {
  const API_BASE = await getApiBase();
  const dot     = document.getElementById('dot-vps');
  const dotAuth = document.getElementById('dot-auth');

  showStatus('Connecting to Aether AI...', 'info');

  // First try to restore a remembered session before showing the form
  const restored = await tryRestoreSession();
  if (restored) return;

  // Step 1: Check auth health endpoint
  try {
    const healthRes = await fetchWithTimeout(`${API_BASE}/auth/health`, 8000);
    const health    = await healthRes.json();

    if (dot) dot.style.background = '#22c55e';

    if (!health.ready) {
      showStatus('Backend not ready: ' + (health.reason || 'unknown'), 'error');
      if (dotAuth) dotAuth.style.background = '#ef4444';
      return;
    }

    if (dotAuth) dotAuth.style.background = '#22c55e';

    // First-time setup: require license key
    if (health.needs_setup) {
      _firstTimeSetup = true;
      document.getElementById('license-field').style.display = '';
      showStatus('FIRST-TIME SETUP — LICENSE KEY REQUIRED', 'info');
      return;
    }

    showStatus('Connected — enter credentials', '');

  } catch (err) {
    if (dot) dot.style.background = '#ef4444';
    if (dotAuth) dotAuth.style.background = '#ef4444';
    // Fallback: try /status endpoint
    try {
      const statusRes = await fetchWithTimeout(`${API_BASE}/status`, 5000);
      const status    = await statusRes.json();
      if (status && !status.error) {
        if (dot) dot.style.background = '#22c55e';
        showStatus('Connected — enter credentials', '');
        return;
      }
    } catch {}
    showStatus('CANNOT REACH BACKEND — CHECK CONNECTION', 'error');
  }
}

// ── Update banner check ─────────────────────────
async function checkUpdateBanner() {
  try {
    if (!window.aether?.getUpdateInfo) return;
    const info = await window.aether.getUpdateInfo();
    if (!info) return;
    const titleEl = document.getElementById('title-bar-version');
    if (titleEl && info.currentVersion) titleEl.textContent = `Aether AI v${info.currentVersion}`;
    if (!info.updateAvailable) return;
    const curEl = document.getElementById('update-current-ver');
    const latEl = document.getElementById('update-latest-ver');
    if (curEl) curEl.textContent = `v${info.currentVersion}`;
    if (latEl) latEl.textContent = `v${info.latestVersion}`;
    const banner = document.getElementById('update-banner');
    if (banner) banner.classList.add('visible');
  } catch (_) { /* non-fatal */ }
}

window.addEventListener('load', () => {
  checkUpdateBanner();
  initLoginScreen();
});
</script>
</body>
</html>
