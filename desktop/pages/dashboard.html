<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AetherCloud-L</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap');

  :root {
    --bg: #0a0a0a;
    --bg-2: #111111;
    --bg-3: #1a1a1a;
    --bg-4: #222222;
    --border: #2a2a2a;
    --border-2: #333333;
    --text-primary: #efefef;
    --text-secondary: #888888;
    --text-muted: #444444;
    --accent: #00d4ff;
    --accent-dim: rgba(0,212,255,0.08);
    --accent-glow: rgba(0,212,255,0.2);
    --green: #22c55e;
    --green-dim: rgba(34,197,94,0.1);
    --amber: #f59e0b;
    --amber-dim: rgba(245,158,11,0.1);
    --red: #ef4444;
    --red-dim: rgba(239,68,68,0.1);
    --sidebar-w: 260px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text-primary);
    font-family: 'Inter', sans-serif;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ═══ TOPBAR ════════════════════════════════════ */
  .topbar {
    height: 40px;
    background: var(--bg-2);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    -webkit-app-region: drag;
    z-index: 100;
    padding: 0 12px;
  }
  .topbar-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.5px;
    flex: 1;
  }
  .topbar-user {
    font-size: 11px;
    color: var(--text-secondary);
    margin-right: 12px;
    -webkit-app-region: no-drag;
  }
  .topbar-controls {
    display: flex;
    -webkit-app-region: no-drag;
  }
  .topbar-btn {
    width: 36px; height: 40px;
    border: none; background: none;
    color: var(--text-muted); font-size: 13px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, color 0.15s;
  }
  .topbar-btn:hover { background: var(--bg-4); color: var(--text-primary); }
  .topbar-btn.close:hover { background: var(--red); color: white; }

  /* ═══ LAYOUT ════════════════════════════════════ */
  .app-body {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ═══ SIDEBAR ═══════════════════════════════════ */
  .sidebar {
    width: var(--sidebar-w);
    background: var(--bg-2);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    flex-shrink: 0;
    transition: width 0.2s;
  }
  .sidebar.collapsed { width: 0; overflow: hidden; }

  .sb-section {
    padding: 16px 14px 12px;
    border-bottom: 1px solid var(--border);
  }
  .sb-header {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    color: var(--text-muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  /* Status badges */
  .sb-status {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .sb-status-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 11px;
    color: var(--text-secondary);
  }
  .sb-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    padding: 2px 6px;
    border-radius: 2px;
    letter-spacing: 0.5px;
  }
  .sb-badge.green { background: var(--green-dim); color: var(--green); }
  .sb-badge.amber { background: var(--amber-dim); color: var(--amber); }
  .sb-badge.red { background: var(--red-dim); color: var(--red); }
  .sb-badge.blue { background: var(--accent-dim); color: var(--accent); }

  /* Chat history */
  .sb-chat-entry {
    padding: 8px 0;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }
  .sb-chat-entry:hover { background: var(--bg-3); }
  .sb-chat-time {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--text-muted);
    margin-bottom: 2px;
  }
  .sb-chat-preview {
    font-size: 11px;
    color: var(--text-secondary);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* Context textarea */
  .sb-context-area {
    width: 100%;
    background: var(--bg-3);
    border: 1px solid var(--border-2);
    border-radius: 0;
    color: var(--text-primary);
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    padding: 8px;
    resize: vertical;
    min-height: 80px;
    max-height: 200px;
    outline: none;
    transition: border-color 0.15s;
  }
  .sb-context-area:focus { border-color: var(--accent); }
  .sb-context-area::placeholder { color: var(--text-muted); }
  .sb-context-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 6px;
    font-size: 10px;
  }
  .sb-context-counter { color: var(--text-muted); font-family: 'JetBrains Mono', monospace; }
  .sb-context-clear {
    color: var(--text-muted);
    cursor: pointer;
    transition: color 0.15s;
  }
  .sb-context-clear:hover { color: var(--red); }

  /* ═══ MAIN PANEL ════════════════════════════════ */
  .main-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Chat area */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
  }
  .chat-welcome {
    text-align: center;
    padding-top: 80px;
  }
  .chat-welcome h2 {
    font-size: 18px;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 8px;
  }
  .chat-welcome p {
    font-size: 13px;
    color: var(--text-secondary);
    max-width: 440px;
    margin: 0 auto;
    line-height: 1.6;
  }

  .chat-msg {
    margin-bottom: 20px;
    max-width: 720px;
  }
  .chat-msg.user { margin-left: auto; }
  .chat-msg-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }
  .chat-msg-body {
    font-size: 13px;
    line-height: 1.6;
    color: var(--text-primary);
    background: var(--bg-2);
    border: 1px solid var(--border);
    padding: 12px 16px;
  }
  .chat-msg.user .chat-msg-body {
    background: var(--accent-dim);
    border-color: rgba(0,212,255,0.15);
  }
  .chat-msg.agent .chat-msg-body {
    border-left: 2px solid var(--accent);
  }

  /* Input bar */
  .input-bar {
    padding: 12px 24px 16px;
    border-top: 1px solid var(--border);
    background: var(--bg);
    display: flex;
    gap: 8px;
  }
  .input-bar input {
    flex: 1;
    background: var(--bg-2);
    border: 1px solid var(--border-2);
    border-radius: 0;
    color: var(--text-primary);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.15s;
  }
  .input-bar input:focus { border-color: var(--accent); }
  .input-bar input::placeholder { color: var(--text-muted); }
  .send-btn {
    background: var(--accent);
    color: var(--bg);
    border: none; border-radius: 0;
    font-family: 'Inter', sans-serif;
    font-size: 12px; font-weight: 600;
    padding: 10px 20px;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .send-btn:hover { opacity: 0.9; }
  .send-btn:disabled {
    background: var(--bg-3);
    color: var(--text-muted);
    cursor: not-allowed;
  }

  /* Status bar */
  .status-bar {
    height: 24px;
    background: var(--bg-2);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--text-muted);
  }
  .status-dot {
    width: 5px; height: 5px; border-radius: 50%;
    display: inline-block; margin-right: 4px;
  }
  .status-dot.green { background: var(--green); }
  .status-dot.red { background: var(--red); }
  .status-dot.amber { background: var(--amber); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
</style>
</head>
<body>

<!-- ═══ TOPBAR ═══════════════════════════════════ -->
<div class="topbar">
  <span class="topbar-title">AetherCloud-L v0.8.6</span>
  <span class="topbar-user" id="topbar-user"></span>
  <div class="topbar-controls">
    <button class="topbar-btn" onclick="toggleSidebar()" title="Toggle sidebar">☰</button>
    <button class="topbar-btn" onclick="window.aether?.minimize()">─</button>
    <button class="topbar-btn" onclick="window.aether?.maximize()">□</button>
    <button class="topbar-btn close" onclick="window.aether?.close()">✕</button>
  </div>
</div>

<!-- ═══ APP BODY ═════════════════════════════════ -->
<div class="app-body">

  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">

    <!-- STATUS -->
    <div class="sb-section">
      <div class="sb-header">STATUS</div>
      <div class="sb-status">
        <div class="sb-status-item">
          <span>Protocol-L</span>
          <span class="sb-badge green" id="sb-protocol">ACTIVE</span>
        </div>
        <div class="sb-status-item">
          <span>VPS2 Backend</span>
          <span class="sb-badge amber" id="sb-vps">CHECKING</span>
        </div>
        <div class="sb-status-item">
          <span>Session</span>
          <span class="sb-badge blue" id="sb-session">ACTIVE</span>
        </div>
      </div>
    </div>

    <!-- PREVIOUS CHATS -->
    <div class="sb-section" style="flex:1; overflow-y:auto;">
      <div class="sb-header">
        PREVIOUS CHATS
        <span style="cursor:pointer; color:var(--accent); font-size:12px;" onclick="clearChatHistory()" title="Clear history">✕</span>
      </div>
      <div id="chat-history"></div>
    </div>

    <!-- USER CONTEXT -->
    <div class="sb-section">
      <div class="sb-header">
        CONTEXT
        <span class="sb-badge green" id="context-badge" style="display:none;">ACTIVE</span>
      </div>
      <textarea
        class="sb-context-area"
        id="user-context"
        placeholder="Tell the agent your preferences...&#10;e.g. 'never delete my files' or 'prefer clean folder structure'"
        maxlength="500"
        oninput="updateContextCounter()"
        onblur="saveUserContext()"
      ></textarea>
      <div class="sb-context-meta">
        <span class="sb-context-counter" id="context-counter">0 / 500</span>
        <span class="sb-context-clear" onclick="clearUserContext()">clear</span>
      </div>
    </div>
  </div>

  <!-- MAIN PANEL -->
  <div class="main-panel">
    <div class="chat-area" id="chat-area">
      <div class="chat-welcome" id="chat-welcome">
        <h2>AetherCloud-L</h2>
        <p>Quantum-secured file intelligence. Ask me to analyze files, organize your vault, draft content, or scan for security patterns.</p>
      </div>
    </div>

    <div class="input-bar">
      <input type="text" id="chat-input" placeholder="Ask AetherCloud anything..."
             onkeydown="if(event.key==='Enter'&&!event.shiftKey)sendMessage()">
      <button class="send-btn" id="send-btn" onclick="sendMessage()">Send</button>
    </div>
  </div>
</div>

<!-- STATUS BAR -->
<div class="status-bar">
  <span><span class="status-dot green" id="status-dot"></span>CONNECTED</span>
  <span id="status-token"></span>
  <span style="margin-left:auto;" id="status-version"></span>
</div>

<script>
// ── State ────────────────────────────────────────
const API_BASE = 'http://198.211.115.41:8080';
let sessionToken = sessionStorage.getItem('session_token') || '';
let username = sessionStorage.getItem('username') || 'user';
let chatMessages = [];

// ── Init ─────────────────────────────────────────
window.addEventListener('load', async () => {
  // Set username in topbar
  document.getElementById('topbar-user').textContent = username;
  document.getElementById('status-token').textContent = `TOKEN: ${sessionToken.substring(0, 12)}...`;

  // Version
  if (window.aether?.getVersion) {
    const v = await window.aether.getVersion();
    document.getElementById('status-version').textContent = `v${v}`;
  }

  // Restore sidebar state
  if (localStorage.getItem('sidebar_collapsed') === 'true') {
    document.getElementById('sidebar').classList.add('collapsed');
  }

  // Restore user context
  const savedCtx = localStorage.getItem('aether_user_context') || '';
  document.getElementById('user-context').value = savedCtx;
  updateContextCounter();
  updateContextBadge();

  // Render chat history
  renderChatHistory();

  // Check VPS status
  checkVPSStatus();
});

// ── VPS Health ───────────────────────────────────
async function checkVPSStatus() {
  const badge = document.getElementById('sb-vps');
  const dot = document.getElementById('status-dot');
  try {
    let data;
    if (window.aetherAPI?.getStatus) {
      data = await window.aetherAPI.getStatus();
    } else {
      const r = await fetch(`${API_BASE}/status`, { signal: AbortSignal.timeout(5000) });
      data = await r.json();
    }
    if (data && !data.error) {
      badge.textContent = 'ONLINE';
      badge.className = 'sb-badge green';
      dot.className = 'status-dot green';
    } else {
      badge.textContent = 'ERROR';
      badge.className = 'sb-badge red';
      dot.className = 'status-dot red';
    }
  } catch {
    badge.textContent = 'OFFLINE';
    badge.className = 'sb-badge red';
    dot.className = 'status-dot red';
  }
}

// ── Chat ─────────────────────────────────────────
async function sendMessage() {
  const input = document.getElementById('chat-input');
  const query = input.value.trim();
  if (!query) return;

  input.value = '';
  document.getElementById('send-btn').disabled = true;

  // Hide welcome
  const welcome = document.getElementById('chat-welcome');
  if (welcome) welcome.style.display = 'none';

  // Add user message
  appendMessage('YOU', query, 'user');
  saveChatToHistory(query);

  // Send to API
  try {
    let result;
    if (window.aetherAPI?.chat) {
      result = await window.aetherAPI.chat(query, sessionToken);
    } else {
      const r = await fetch(`${API_BASE}/agent/chat`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${sessionToken}`,
        },
        body: JSON.stringify({ query }),
      });
      result = await r.json();
    }

    if (result.error) {
      appendMessage('SYSTEM', '⚠ ' + (result.message || 'Request failed'), 'agent');
    } else {
      const reply = result.response || result.reply || result.message || JSON.stringify(result);
      appendMessage('AETHER', reply, 'agent');
    }
  } catch (e) {
    appendMessage('SYSTEM', '⚠ Connection error: ' + e.message, 'agent');
  }

  document.getElementById('send-btn').disabled = false;
  document.getElementById('chat-input').focus();
}

function appendMessage(label, text, type) {
  const area = document.getElementById('chat-area');
  const div = document.createElement('div');
  div.className = `chat-msg ${type}`;
  div.innerHTML = `
    <div class="chat-msg-label">${label}</div>
    <div class="chat-msg-body">${escapeHtml(text)}</div>
  `;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function escapeHtml(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

// ── Sidebar ──────────────────────────────────────
function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  sb.classList.toggle('collapsed');
  localStorage.setItem('sidebar_collapsed', sb.classList.contains('collapsed'));
}

// ── User Context ─────────────────────────────────
function updateContextCounter() {
  const ta = document.getElementById('user-context');
  document.getElementById('context-counter').textContent = `${ta.value.length} / 500`;
  updateContextBadge();
}

function updateContextBadge() {
  const badge = document.getElementById('context-badge');
  const val = document.getElementById('user-context').value.trim();
  if (val.length > 0) {
    badge.style.display = '';
    badge.textContent = 'ACTIVE';
    badge.className = 'sb-badge green';
  } else {
    badge.style.display = '';
    badge.textContent = 'NONE';
    badge.className = 'sb-badge amber';
  }
}

async function saveUserContext() {
  const ctx = document.getElementById('user-context').value.trim();
  localStorage.setItem('aether_user_context', ctx);
  updateContextBadge();

  // Push to backend
  try {
    if (window.aetherAPI?.setContext) {
      await window.aetherAPI.setContext(ctx, sessionToken);
    } else {
      await fetch(`${API_BASE}/agent/context`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${sessionToken}`,
        },
        body: JSON.stringify({ context: ctx }),
      });
    }
  } catch { /* silent — context is saved locally */ }
}

function clearUserContext() {
  document.getElementById('user-context').value = '';
  updateContextCounter();
  saveUserContext();
}

// ── Chat History ─────────────────────────────────
function saveChatToHistory(query) {
  const history = JSON.parse(localStorage.getItem('aether_chat_history') || '[]');
  history.unshift({ query, time: Date.now() });
  if (history.length > 20) history.length = 20;
  localStorage.setItem('aether_chat_history', JSON.stringify(history));
  renderChatHistory();
}

function renderChatHistory() {
  const container = document.getElementById('chat-history');
  const history = JSON.parse(localStorage.getItem('aether_chat_history') || '[]');

  if (history.length === 0) {
    container.innerHTML = '<div style="font-size:11px; color:var(--text-muted); padding:4px 0;">No previous chats</div>';
    return;
  }

  container.innerHTML = history.slice(0, 10).map(h => `
    <div class="sb-chat-entry" onclick="restoreChat('${escapeAttr(h.query)}')">
      <div class="sb-chat-time">${formatRelativeTime(h.time)}</div>
      <div class="sb-chat-preview">${escapeHtml(h.query)}</div>
    </div>
  `).join('');
}

function restoreChat(query) {
  document.getElementById('chat-input').value = query;
  document.getElementById('chat-input').focus();
}

function clearChatHistory() {
  localStorage.removeItem('aether_chat_history');
  renderChatHistory();
}

function formatRelativeTime(ts) {
  const diff = Date.now() - ts;
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  const days = Math.floor(hrs / 24);
  return `${days}d ago`;
}

function escapeAttr(str) {
  return str.replace(/'/g, "\\'").replace(/\n/g, ' ');
}
</script>
</body>
</html>
