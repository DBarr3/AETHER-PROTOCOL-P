# AetherCloud nginx site config.
# Install to /etc/nginx/sites-available/aether and symlink to sites-enabled.
# Reload with `sudo systemctl reload nginx` — never `restart` in prod.
#
# Rate limit zones MUST live in the http { } block, not in server { }.
# If you're editing /etc/nginx/nginx.conf directly, paste the two
# limit_req_zone lines into the http block and the server {} block below
# goes in sites-available/ as normal.

# ─── http block additions ────────────────────────────────────────────────
# Add these lines at the top of /etc/nginx/nginx.conf's http block:
#
#   limit_req_zone $binary_remote_addr zone=agent_run:10m rate=60r/m;
#   limit_req_zone $binary_remote_addr zone=global:10m    rate=600r/m;
#
# 10m = ~160k tracked IPs per zone. rate is per-IP per time window.

# ─── HTTPS server ────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.aethersystems.net;

    # TLS — set after `certbot --nginx -d api.aethersystems.net` runs once.
    ssl_certificate     /etc/letsencrypt/live/api.aethersystems.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.aethersystems.net/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # HSTS — 1 year, preload-eligible. ONLY enable after you're confident
    # every subdomain runs HTTPS; otherwise you'll strand HTTP-only services.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Prompts are small; cap the body so a malicious client can't upload
    # 100MB of garbage and make us eat bandwidth + disk.
    client_max_body_size 2m;
    client_body_timeout 30s;
    client_header_timeout 15s;

    # Apply the global rate limit to every location as a baseline.
    limit_req zone=global burst=30 nodelay;
    limit_req_status 429;

    # ─── /agent/run — defense-in-depth rate cap ──────────────────
    # PricingGuard is the REAL enforcement. This zone exists to protect
    # nginx + uvicorn workers from an abusive client hammering the path
    # faster than the guard can respond. 60r/min is well above the spec's
    # daily-cap math for even abusive personas.
    location = /agent/run {
        limit_req zone=agent_run burst=10 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Extended timeout — Claude heavy calls can take 60-90s.
        proxy_read_timeout 120s;
        proxy_connect_timeout 5s;
    }

    # ─── Healthchecks — no rate limit, always cheap ─────────────
    # Excluded from the global zone so a failing backend doesn't
    # cascade into "we can't even probe it."
    location /healthz {
        limit_req off;
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_connect_timeout 2s;
        proxy_read_timeout 3s;
    }

    # ─── Everything else ──────────────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 5s;

        # SSE endpoints (/agent/mcp-status) need these to actually stream.
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
    }

    # Let's Encrypt renewal — certbot drops challenges here.
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }
}

# ─── HTTP → HTTPS redirect ───────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name api.aethersystems.net;

    # Leave the ACME challenge on :80 so cert renewals work even if the
    # redirect gets quirky.
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
